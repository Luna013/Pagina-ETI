{% extends "base.html" %}
{% block style %}
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='../static/style.css') }}">
{% endblock %}
{% block title %} Registrar Usuario {% endblock %}
{% block header %} <h1>Envío de Trabajo</h1> {% endblock %}
{% block content %}
    <form action="{{ url_for('enviarTrabajo') }}" method="post" enctype="multipart/form-data" class="formulario-trabajo">
        <label for="titulo" class="labels">Titulo</label>
        <input type="text" name="titulo" placeholder="Titulo" class="inputs-formulario">
        <label for="resumen" class="labels" >Resumen</label>
        <textarea name="resumen" placeholder="Resumen"></textarea>
        <label for="Area" class="labels">Area</label>
        <select name="area">
            <option value="AE">Agroecología</option>
            <option value="CA">Comunicacion Ambiental</option>
            <option value="EF">Ecofisiologia</option>
            <option value="ES">Ecosistemas</option>
            <option value="RN">Recursos Naturales</option>
        </select>
        <label for="nombreAutor" class="labels">Nombre del Autor</label>
        <input type="text" name="nombreAutor" placeholder="Nombre" class="inputs-formulario">
        <label for="apellidoAutor" class="labels">Apellido del Autor</label>
        <input type="text" name="apellidoAutor" placeholder="Apellido" class="inputs-formulario">
        <label for="email" class="labels">Email</label>
        <input type="email" name="email" placeholder="ejemplo@ejemplo.com" class="inputs-formulario">
        <label for="Archivo" class="labels">Sube el archivo aquí</label>
        <input type="file" name="archivo">
        <input type="submit" value="Enviar Trabajo">
    </form>
{% endblock %}
