{% extends "base.html" %}
{% block style %}
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='../static/style.css') }}">
{% endblock %}
{% block content %}
    <div class="mensaje {{ tipo }}">
    {{ mensaje }}
    {% if tipo == "error" %}
        <a href="javascript:history.back()" class="boton-volver">Volver</a>
    {% elif tipo == "error-1"%}
        <a href="{{ url_for('enviarTrabajo') }}" class="boton-volver">Volver</a>
    {% endif%}
    </div>
{% endblock %}
