{% extends "base.html" %}
{% block style %}
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='../static/style.css') }}">
{% endblock %}
{% block title %} Consulta de Estado {% endblock %}
{% block header %} <h1>Consultar Estado de Trabajo</h1> {% endblock %}
{% block content %}
    <form action="{{ url_for('consultarTrabajo') }}" method="post" enctype="multipart/form-data" class="formulario-trabajo">
        <label for="id" class="labels">ID del Trabajo</label>
        <input type="text" name="id" placeholder="ingrese el ID" class="inputs-formulario">
        <label for="correo" class="labels" >Correo del Autor</label>
        <input type="text" name="correo" placeholder="Correo" class="inputs-formulario">
        <input type="submit" value="Consultar Trabajo">
    </form>
{% endblock %}
